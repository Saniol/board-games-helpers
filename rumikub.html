<html>
    <head>
        <script src="./jquery-3.1.1.min.js"></script>
        <style>
            :root {
                --bg-start: #eaf7ff;
                --bg-end: #bfe2ff;
                --panel: rgba(255, 255, 255, 0.8);
                --panel-border: rgba(87, 150, 255, 0.25);
                --text: #12324d;
                --muted: #4e6a83;
                --accent: #3f8fe8;
                --accent-strong: #1f6fd2;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: var(--text);
                background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .app {
                width: min(900px, 100%);
                position: relative;
                background: transparent;
                border: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 48px 28px 24px;
            }

            .home-link {
                position: absolute;
                top: 14px;
                right: 14px;
                padding: 8px 12px;
                border-radius: 999px;
                background: rgba(63, 143, 232, 0.12);
                color: var(--accent-strong);
                font-size: 0.9rem;
                font-weight: 700;
                text-decoration: none;
                border: 1px solid rgba(63, 143, 232, 0.2);
            }

            .timer-shell {
                display: flex;
                justify-content: center;
                margin: 24px 0 12px;
            }

            #timer {
                font-size: clamp(4rem, 12vw, 8rem);
                font-weight: 700;
                text-align: center;
                letter-spacing: 0.04em;
                padding: 12px 22px;
                border-radius: 18px;
                box-shadow: 0 8px 24px rgba(31, 111, 210, 0.08);
            }

            .hint {
                text-align: center;
                color: var(--muted);
                margin-bottom: 24px;
            }

            .pill-row {
                display: grid;
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 10px;
                margin-top: 8px;
            }

            .message-pill,
            .random-button {
                border: 0;
                border-radius: 999px;
                padding: 10px 14px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
                color: var(--text);
                background: linear-gradient(135deg, #ffffff, #dcefff);
                box-shadow: 0 6px 14px rgba(31, 111, 210, 0.12);
            }

            .message-pill:hover,
            .random-button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 18px rgba(31, 111, 210, 0.18);
            }

            .random-button {
                background: linear-gradient(135deg, var(--accent), var(--accent-strong));
                color: white;
            }

            @media (max-width: 700px) {
                body {
                    padding: 10px;
                    align-items: flex-start;
                }

                .app {
                    width: 100%;
                    padding: 48px 14px 16px;
                    border-radius: 20px;
                }

                .home-link {
                    top: 10px;
                    right: 10px;
                    padding: 8px 12px;
                    font-size: 0.9rem;
                }

                .timer-shell {
                    margin: 20px 0 10px;
                }

                #timer {
                    font-size: clamp(3.2rem, 16vw, 4.8rem);
                    padding: 10px 18px;
                }

                .hint {
                    font-size: 0.95rem;
                    line-height: 1.45;
                    margin-bottom: 16px;
                }

                .pill-row {
                    grid-template-columns: 1fr 1fr;
                    gap: 8px;
                }

                .message-pill,
                .random-button {
                    width: 100%;
                    min-width: 0;
                    padding: 12px 14px;
                    font-size: 0.95rem;
                }
            }
        </style>
        <script>
            (function($) {
                const fullTime = 60;
                let timer = fullTime;
                const speechUtter = new SpeechSynthesisUtterance();
                const audioContext = new AudioContext();
                const gainNode = audioContext.createGain();
                const defaultGain = 0.075;
                const speakTimes = [0, 1, 2, 3, 4, 5, 10, 15, 30];
                const funnyMessages = [
                    { key: 'c', label: 'Trzy', text: 'Ciągnij trzy.' },
                    { key: 'd', label: 'Kot', text: 'Dziękuję Kocie!' },
                    { key: 'j', label: 'Joker', text: 'Dawać tu dżokusie' },
                    { key: 'k', label: 'Mama', text: 'Mama kończy.' },
                    { key: 'm', label: 'Oszustwo', text: 'Mateusz nie oszukuj!' },
                    { key: 'n', label: 'Toast', text: 'Na zdrowie!' },
                    { key: 's', label: 'Seria', text: 'Ze stej serii' },
                    { key: 't', label: 'Tata', text: 'Tata, gdzie się patrzysz?' },
                    { key: 'u', label: 'Spokój', text: 'Mati uspokój się' },
                    { key: 'z', label: 'Przegrana', text: 'Znowu przegram.' }
                ];

                speechUtter.lang = 'pl';
                gainNode.gain.value = defaultGain;
                gainNode.connect(audioContext.destination);

                const getColor = (timer) => {
                    if (timer > 30) {
                        return '#f6fbff';
                    }
                    if (timer >= 10) {
                        return '#ffef98';
                    }
                    if (timer < 10 && timer > 0) {
                        return '#ffbfc1';
                    }
                    return '#dce4ee';
                };
                const formatSeconds = seconds => {
                    if (seconds >= 10) {
                        return seconds;
                    }

                    return `0${seconds}`;
                }
                const formatTime = (timer) => {
                    if (timer >= 0) {
                        return `${Math.floor(timer / 60)}:${formatSeconds(timer%60)}`;
                    }

                    return '00:00';
                };
                const updateView = () => {
                    const color = getColor(timer);

                    $('#timer').html(formatTime(timer));
                    $('body').css('background', `linear-gradient(135deg, ${color}, #bfe2ff)`);
                };
                const getSpeakMessage = () => {
                    if (timer === 0) {
                        return 'koniec czasu';
                    }

                    return timer < 10
                                ? String(timer)
                                : `${timer} - sekund`;
                };
                const getSpeakRate = () => {
                    if (timer <= 5) {
                        return 2.5;
                    }
                    if (timer === 10 || timer === 0) {
                        return 1;
                    }
                    return 0.75;
                };
                const speakTime = () => {
                    if (timer < 0 || speakTimes.indexOf(timer) === -1) {
                        return;
                    }

                    speechUtter.text = getSpeakMessage();
                    speechUtter.rate = getSpeakRate();

                    window.speechSynthesis.speak(speechUtter);
                };
                const speakText = (text) => {
                    speechUtter.text = text;
                    speechUtter.rate = 0.7;

                    window.speechSynthesis.speak(speechUtter);
                }
                const playBeep = () => {
                    const o = audioContext.createOscillator();

                    o.type = "triangle";
                    o.connect(gainNode);
                    o.start();

                    setTimeout(() => o.stop(), 75);
                }
                const resetTimer = () => {
                    timer = fullTime;
                    updateView();
                    playBeep();
                };
                const processTimer = () => {
                    timer--;
                    speakTime();
                    updateView();
                };
                const getFunnyMessage = (evt) => {
                    const key = evt.key ? evt.key.toLowerCase() : '';
                    const keyCodeMap = {
                        67: 'c',
                        68: 'd',
                        74: 'j',
                        75: 'k',
                        77: 'm',
                        78: 'n',
                        83: 's',
                        84: 't',
                        85: 'u',
                        90: 'z'
                    };
                    const normalizedKey = keyCodeMap[evt.keyCode] || key;

                    return funnyMessages.find(message => message.key === normalizedKey) || null;
                }
                const speakFunnyMessage = (messageKey) => {
                    const message = funnyMessages.find(item => item.key === messageKey);

                    if (message) {
                        speakText(message.text);
                    }
                };
                const speakRandomFunnyMessage = () => {
                    const message = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];

                    if (message) {
                        speakText(message.text);
                    }
                };
                const penaltyMessage = () => {
                    gainNode.gain.value = 2;
                    speakText('Karny! Ciągniesz 3 karty i tracisz turę');
                    gainNode.gain.value = defaultGain;
                };

                $(document).ready(() => {
                    window.addEventListener('keydown', (evt) => {
                        const funnyMessage = getFunnyMessage(evt);

                        if (evt.keyCode === 88 || evt.key === 'x' || evt.key === 'X') {
                            penaltyMessage();
                            return;
                        }
                        if (funnyMessage) {
                            speakText(funnyMessage.text);
                            return;
                        }

                        resetTimer();
                    });
                    window.addEventListener('click', (evt) => {
                        if ($(evt.target).hasClass('message-pill') || $(evt.target).hasClass('random-button')) {
                            return;
                        }

                        resetTimer();
                    });

                    $('.pill-row').on('click', '.message-pill', function() {
                        speakFunnyMessage($(this).data('key'));
                    });
                    $('.pill-row').on('click', '.random-button', () => {
                        speakRandomFunnyMessage();
                    });

                    updateView();
                    setInterval(processTimer, 1000);
                });
            })(jQuery);
        </script>
    </head>
    <body>
        <div class="app">
            <a class="home-link" href="./index.html">Home</a>
            <div class="timer-shell">
                <div id="timer">00:00</div>
            </div>
            <div class="hint">Press any key to reset the timer, or use the buttons below for funny messages.</div>
            <div class="pill-row">
                <button class="message-pill" data-key="c">Trzy</button>
                <button class="message-pill" data-key="d">Kot</button>
                <button class="message-pill" data-key="j">Joker</button>
                <button class="message-pill" data-key="k">Mama</button>
                <button class="message-pill" data-key="m">Oszustwo</button>
                <button class="message-pill" data-key="n">Toast</button>
                <button class="message-pill" data-key="s">Seria</button>
                <button class="message-pill" data-key="t">Tata</button>
                <button class="message-pill" data-key="u">Spokój</button>
                <button class="random-button">Losowo</button>
            </div>
        </div>
    </body>
</html>
