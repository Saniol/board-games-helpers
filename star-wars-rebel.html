<html>
    <head>
        <script src="./jquery-3.1.1.min.js"></script>
        <script src="./star-wars-rebel/script.js"></script>
        <style>
            :root {
                --page-bg-start: #07111f;
                --page-bg-end: #183a62;
                --panel: rgba(10, 24, 42, 0.9);
                --panel-border: rgba(140, 196, 255, 0.2);
                --text: #eef6ff;
                --muted: #a8c0dc;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                color: var(--text);
                background: linear-gradient(135deg, var(--page-bg-start), var(--page-bg-end));
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .container {
                width: min(1280px, 100%);
                margin: 0 auto;
                background: var(--panel);
                border: 1px solid var(--panel-border);
                border-radius: 24px;
                box-shadow: 0 20px 55px rgba(0, 0, 0, 0.3);
                padding: 24px;
            }

            .top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 18px;
                gap: 12px;
            }

            .page-title {
                font-size: 1.05rem;
                font-weight: 700;
                color: var(--muted);
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .home-link {
                padding: 8px 12px;
                border-radius: 999px;
                background: rgba(47, 127, 214, 0.16);
                color: #eaf6ff;
                font-size: 0.9rem;
                font-weight: 700;
                text-decoration: none;
                border: 1px solid rgba(255, 255, 255, 0.16);
            }

            .cards {
                display: grid;
                grid-template-columns: repeat(6, minmax(0, 1fr));
                gap: 16px;
                align-items: stretch;
            }

            .box {
                width: 100%;
                aspect-ratio: 2 / 3;
                margin: 0;
                position: relative;
                border-radius: 18px;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.18);
                box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.16), 0 10px 20px rgba(0, 0, 0, 0.24);
                -moz-user-select: none;
                -webkit-user-select: none;
                -ms-user-select: none;
                user-select: none;
                -o-user-select: none;
                cursor: pointer;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .box:hover {
                transform: translateY(-4px);
                box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.16), 0 16px 28px rgba(0, 0, 0, 0.28);
            }

            .quater {
                width: 50%;
                height: 50%;
                margin: 0;
                float: left;
            }

            .red {
                background: linear-gradient(145deg, #e95b5b, #9c1d1d);
            }

            .yellow {
                background: linear-gradient(145deg, #f8de74, #a27b00);
            }

            .blue {
                background: linear-gradient(145deg, #4e7dff, #1737aa);
            }

            .violet {
                background: linear-gradient(145deg, #b86bff, #5d2e8d);
            }

            .bb {
                background: linear-gradient(145deg, #10253f, #07111f);
            }

            .fire {
                background: linear-gradient(145deg, #08111f, #101b3b);
                color: white;
            }

            .counter {
                text-align: center;
                position: absolute;
                z-index: 5;
                top: 50%;
                transform: translateY(-50%);
                font-size: clamp(2rem, 3vw, 3.2rem);
                width: 100%;
                font-weight: 700;
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
                color: white;
            }

            .stats {
                margin-top: 24px;
                display: grid;
                gap: 10px;
            }

            .info {
                width: 100%;
                text-align: center;
                font-size: clamp(1.2rem, 2vw, 1.7rem);
                font-weight: 600;
                margin: 0;
                color: var(--text);
            }

            .reset-btn {
                width: min(220px, 100%);
                text-align: center;
                font-size: clamp(1.1rem, 2vw, 1.45rem);
                font-weight: 700;
                background: linear-gradient(135deg, #2f7fd6, #1c4f8f);
                color: white;
                margin: 10px auto 0;
                padding: 12px 16px;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.16);
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
                cursor: pointer;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .reset-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
            }

            @media (max-width: 900px) {
                .cards {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }
            }

            @media (max-width: 700px) {
                body {
                    padding: 10px;
                    align-items: flex-start;
                }

                .container {
                    width: 100%;
                    padding: 14px;
                    border-radius: 18px;
                }

                .top-bar {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                    margin-bottom: 14px;
                }

                .home-link {
                    align-self: flex-end;
                    padding: 8px 12px;
                }

                .cards {
                    grid-template-columns: 1fr;
                    gap: 10px;
                }

                .box {
                    aspect-ratio: 3 / 2;
                    border-radius: 12px;
                }

                .counter {
                    font-size: 1.6rem;
                    top: 48%;
                }

                .stats {
                    gap: 8px;
                    margin-top: 16px;
                }

                .info {
                    font-size: 0.95rem;
                }

                .reset-btn {
                    width: 100%;
                    font-size: 1rem;
                    padding: 12px 14px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="top-bar">
                <div class="page-title">Star Wars Rebel</div>
                <a class="home-link" href="./index.html">Home</a>
            </div>
            <div class="cards">
                <div class="box red">
                    <p class="counter"></p>
                </div>
                <div class="box yellow">
                    <p class="counter"></p>
                </div>
                <div class="box blue">
                    <p class="counter"></p>
                </div>
                <div class="box violet">
                    <p class="counter"></p>
                </div>
                <div class="box bb">
                    <p class="counter"></p>
                    <div class="quater red"></div>
                    <div class="quater yellow"></div>
                    <div class="quater blue"></div>
                    <div class="quater violet"></div>
                </div>
                <div class="box fire">
                    <p class="counter"></p>
                </div>
            </div>
            <div class="stats">
                <p class="info">Pozostało w sumie: <span class="total-left"></span></p>
                <p class="info">Prawdopodobieństwo wybuchu: <span class="fire-rate"></span></p>
                <p class="info">Ilość zwykłych kart na wybuch: <span class="cards-avg"></span></p>
                <div class="reset-btn">Reset</div>
            </div>
        </div>
    </body>
</html>
